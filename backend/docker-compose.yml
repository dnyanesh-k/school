services:
  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: school_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: school_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.com
      PGADMIN_DEFAULT_PASSWORD: rootpassword
    ports:
      - "5050:80"       # open http://localhost:5050
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_api
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      # Overrides anything in .env — always points to local postgres container
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/school_db
      DEBUG: "true"
    env_file:
      - path: .env
        required: false      # won't error if .env missing; SECRET_KEY etc still needed
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
