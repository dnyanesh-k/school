services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vidyatrack-api:latest
    container_name: vidyatrack-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "false"         # never expose Swagger in prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
