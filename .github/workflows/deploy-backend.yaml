name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"   # only trigger when backend changes
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Build & deploy on EC2
    runs-on: ubuntu-latest          # CI runner (just SSH agent — build happens on EC2)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Pull latest code ==="
            git -C ~/school pull origin main

            echo "=== Move to backend ==="
            cd ~/school/backend

            echo "=== Build image on EC2 (ARM64 native) ==="
            docker compose -f docker-compose.prod.yml build

            echo "=== Restart with zero-downtime swap ==="
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head

            echo "=== Remove old images ==="
            docker image prune -f

            echo "=== Health check ==="
            sleep 20
            curl -sf http://localhost:8000/health && echo " Backend healthy" || (echo " Health check failed"; docker compose -f docker-compose.prod.yml logs --tail=50 api; exit 1)
